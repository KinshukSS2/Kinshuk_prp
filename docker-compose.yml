services:
  rbac-db:
    image: postgres:16
    container_name: rbac-prototype-db
    environment:
      POSTGRES_DB: rbac_prototype
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - rbac_prototype_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbac_prototype"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  rbac_prototype_data:
